apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: expense
  labels:
    project: expense
    tier: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      project: expense
      tier: backend

  template:
    metadata:
      labels:
        project: expense
        tier: backend

    spec:
      containers:
      - name: nginx
        image: kavya478/backend:2.0

        envFrom:
        - configMapRef:
            name: backend