kind: Service
apiVersion: v1
metadata:
  name: backend-headless
  namespace: expense
  labels:
    project: expense
    tier: backend
spec:
  clusterIP: None
  selector:
    project: expense
    tier: backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080

---

kind: ConfigMap
apiVersion: v1
metadata:
  name: backend
  namespace: expense
data:
  DB_HOST: mysql

---

kind: Service
apiVersion: v1
metadata:
  name: backend
  namespace: expense
  labels:
    project: expense
    tier: backend
spec:
  selector:
    project: expense
    tier: backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080

---

kind: Deployment
apiVersion: apps/v1
metadata:
  name: backend
  labels:
    project: expense
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      project: expense
      tier: backend
  template:
    metadata:
      labels:
        project: expense
        tier: backend
    spec:
    containers:
    - name: nginx
      image: kavya478/backend:2.0
      envFrom:
      - ConfigMapRef:
          name: backend