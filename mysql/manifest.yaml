kind: Service
apiVersion: v1
metadata:
  name: mysql-headless
  namespace: expense
  labels:
    project: expense
    tier: mysql
spec:
  clusterIP: None
  selector:
    project: expense
    tier: mysql
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306


---

kind: Service
apiVersion: v1
metadata:
  name: mysql
  namespace: expense
  labels:
    project: expense
    tier: mysql
spec:
  selector:
    project: expense
    tier: mysql
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306

---

kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: mysql
  namespace: expense
  labels:
    project: expense
    tier: mysql
spec:
  selector:
    matchLabels:
      project: expense
      tier: mysql
  serviceName: "mysql-headless"
  replicas: 2 # by default is 1
  
  template:
    metadata:
      labels:
     
        project: expense
        tier: mysql # has to match .spec.selector.matchLabels
    spec:
    
      containers:
      - name: mysql
        image: kavya478/mysql:1.0.0
        volumeMounts:
        - name: mysql
          mountPath: /var/lib/mysql
  # Instead of creating a PVC resource, you can directly provide in statefulset
  volumeClaimTemplates:
  - metadata:
      name: mysql
      namespace: expense
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "ebs-sc"
      resources:
        requests:
          storage: 1Gi